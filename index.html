<!DOCTYPE html>

<head>

  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#0c0d10; }
    ::selection { background:#e7e5df; color:#0c0d10; }
    .enter-link {

      gap: 10px;

      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 14px 4px;
      border-top: 1px solid rgba(244,242,236,0.3);
      transition: color 0.3s ease, border-top-color 0.3s ease;
      animation: fadeUp 1.2s ease both;
    }
    .enter-link:hover { color: #6E93B8; border-top-color: #2E5C8A; }
  </style>
</head>
<body>
<div style="min-height:100vh; width:100%; background:#0c0d10; color:#f4f2ec; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif; position:relative; overflow:hidden;">

      <rect x="64" y="80" width="18" height="11" rx="3" fill="#0c0d10"></rect>

      <div style="font-family:'Newsreader',serif; font-style:italic; font-weight:400; font-size:16px; color:rgba(244,242,236,0.6); letter-spacing:0.01em; text-align:center;">Operator-led venture capital<br>for cybersecurity founders</div>

</div>
